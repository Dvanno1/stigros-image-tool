name: Bouw Windows-programma

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: Versietag voor de GitHub Release, bijvoorbeeld v1.0.0
        required: true
        type: string
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows 10 en 11 (64-bit)
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6

      - name: Python installeren
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: pip

      - name: Benodigdheden installeren
        run: python -m pip install --requirement requirements.txt

      - name: Syntax controleren
        run: python -m py_compile Automatische_bottles.py

      - name: Tests uitvoeren
        run: python -m unittest discover -s tests -v

      - name: Windows-programma bouwen
        run: >-
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name Stigros-Afbeeldingen
          --collect-all pillow_avif
          Automatische_bottles.py

      - name: Gebouwd programma controleren
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/Stigros-Afbeeldingen.exe")) {
            throw "Stigros-Afbeeldingen.exe is niet gebouwd."
          }

      - name: Windows-programma uploaden
        uses: actions/upload-artifact@v4
        with:
          name: Stigros-Afbeeldingen-Windows-64-bit
          path: dist/Stigros-Afbeeldingen.exe
          if-no-files-found: error
          retention-days: 30

      - name: GitHub Release maken
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ inputs.version_tag }}
        run: >-
          gh release create "$env:VERSION_TAG"
          "dist/Stigros-Afbeeldingen.exe"
          --target "$env:GITHUB_SHA"
          --title "Stigros Afbeeldingen $env:VERSION_TAG"
          --generate-notes
