name: Bouw Windows-programma

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: Versietag voor de GitHub Release, bijvoorbeeld v1.0.0
        required: true
        type: string
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows 10 en 11 (64-bit)
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6

      - name: Python installeren
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: pip

      - name: Benodigdheden installeren
        run: python -m pip install --requirement requirements.txt

      - name: Syntax controleren
        run: python -m py_compile Automatische_bottles.py

      - name: Tests uitvoeren
        run: python -m unittest discover -s tests -v

      - name: Windows-programma bouwen
        run: >-
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name Stigros-Afbeeldingen
          --icon assets/stigros_logo.ico
          --add-data "stigros_logo.png:."
          --collect-all pillow_avif
          Automatische_bottles.py

      - name: Gebouwd programma controleren
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/Stigros-Afbeeldingen.exe")) {
            throw "Stigros-Afbeeldingen.exe is niet gebouwd."
          }

      - name: Windows-programma uploaden
        uses: actions/upload-artifact@v4
        with:
          name: Stigros-Afbeeldingen-Windows-64-bit
          path: dist/Stigros-Afbeeldingen.exe
          if-no-files-found: error
          retention-days: 30

      - name: Releasetag bepalen
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $versionTag = $env:MANUAL_VERSION_TAG
          }
          else {
            $match = Select-String `
              -Path "Automatische_bottles.py" `
              -Pattern '^APP_VERSION = "([^"]+)"$'

            if (-not $match) {
              throw "APP_VERSION is niet gevonden."
            }

            $version = $match.Matches[0].Groups[1].Value
            $version = $version.TrimStart([char[]]"vV")
            $versionTag = "v$version"
          }

          $tagPattern = '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)' +
            '(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$'

          if ($versionTag -notmatch $tagPattern) {
            throw "Ongeldige releasetag: $versionTag"
          }

          "VERSION_TAG=$versionTag" >> $env:GITHUB_ENV

      - name: GitHub Release maken of bijwerken
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $executable = "dist/Stigros-Afbeeldingen.exe"
          $title = "Stigros Afbeeldingen $env:VERSION_TAG"

          gh release view "$env:VERSION_TAG" *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload `
              "$env:VERSION_TAG" `
              "$executable" `
              --clobber

            if ($LASTEXITCODE -ne 0) {
              throw "Bijwerken van het Release-bestand is mislukt."
            }

            gh release edit `
              "$env:VERSION_TAG" `
              --target "$env:GITHUB_SHA" `
              --title "$title" `
              --latest
          }
          else {
            gh release create `
              "$env:VERSION_TAG" `
              "$executable" `
              --target "$env:GITHUB_SHA" `
              --title "$title" `
              --generate-notes `
              --latest
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Maken of bijwerken van de GitHub Release is mislukt."
          }
